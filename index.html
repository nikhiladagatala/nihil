<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Persona Creator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>✨ Persona Creator</h1>

  <div class="form">
    <input type="text" id="name" placeholder="Name">
    <input type="number" id="age" placeholder="Age">
    <input type="text" id="profession" placeholder="Profession">
    <input type="text" id="personality" placeholder="Personality Traits">
    <button onclick="createPersona()">Create Persona</button>
  </div>

  <div id="personaList" class="persona-list"></div>
</div>

<script src="script.js"></script>
</body>
</html>
